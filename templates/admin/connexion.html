{% extends "base.html" %}
{% block titre %}Connexion admin — UniSignal{% endblock %}

{% block content %}
<a href="{{ url_for('landing') }}" class="retour">← Retour à l'accueil</a>
<h1 class="page-titre">Connexion administrateur</h1>
<p class="page-soustitre">Connectez-vous pour accéder au tableau de bord.</p>

{% if error %}
<div class="alerte">{{ error }}</div>
{% endif %}

<form class="carte" method="POST" action="{{ url_for('admin_connexion_post') }}" style="max-width:420px;">
    <div class="form-groupe">
        <label for="nom">Nom d'utilisateur <span class="requis">*</span></label>
        <input type="text" name="nom" id="nom" value="{{ nom or '' }}">
    </div>
    <div class="form-groupe">
        <label for="mot_de_passe">Mot de passe <span class="requis">*</span></label>
        <input type="password" name="mot_de_passe" id="mot_de_passe">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primaire">Se connecter</button>
    </div>
</form>

<p style="text-align:center;margin-top:1.5rem;font-size:14px;color:var(--gris);">
    Pas encore de compte ? <a href="{{ url_for('admin_inscription') }}" style="color:var(--brique);">S'inscrire</a>
</p>
{% endblock %}
