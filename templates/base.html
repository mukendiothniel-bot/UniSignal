<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titre %}UniSignal{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav">
        <a href="{{ url_for('landing') }}" class="nav-marque">
            <span class="pastille">!</span> UniSignal
        </a>
        <div class="nav-liens">
            <a href="{{ url_for('landing') }}">Accueil</a>
            <a href="{{ url_for('signaler') }}">Signaler</a>
            <a href="{{ url_for('liste') }}">Consulter</a>
        </div>
    </nav>

    <main class="contenu">
        {% block content %}{% endblock %}
    </main>

    <footer class="pied">
        UniSignal — Projet Tutoré · L1 Sciences Informatiques
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
